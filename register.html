<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mystore – Timeregistrering</title>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&family=Open+Sans:wght@400;500&display=swap" rel="stylesheet">
  <script src="config.js?v=3"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal: #026B85; --teal-dark: #013E52; --teal-light: #E8F4F7;
      --success: #00734D; --success-light: #E6F4EA;
      --error: #C0392B; --error-light: #FDF0EF;
      --text: #1A1A1A; --text-muted: #5A6472;
      --border: #D0D7DE; --bg: #F5F7F9;
    }
    body { font-family: 'Open Sans', sans-serif; background: var(--bg); min-height: 100vh; }

    .topbar { background: var(--teal-dark); color: #fff; padding: 0 1.5rem; height: 52px; display: flex; align-items: center; justify-content: space-between; }
    .topbar-logo { font-family: 'Ubuntu', sans-serif; font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .topbar-logo-mark { width: 28px; height: 28px; background: var(--teal); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
    .topbar-logo-mark svg { width: 16px; height: 16px; fill: #fff; }
    .topbar-right { display: flex; align-items: center; gap: 1rem; font-size: 13px; }
    .week-badge { background: rgba(255,255,255,0.15); padding: 3px 10px; border-radius: 20px; font-size: 12px; }
    .user-name { opacity: 0.85; }
    .btn-logout { background: none; border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 4px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }
    .btn-logout:hover { background: rgba(255,255,255,0.1); }

    .main { max-width: 860px; margin: 0 auto; padding: 1.5rem 1rem; }
    .card { background: #fff; border-radius: 12px; border: 1px solid var(--border); padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-family: 'Ubuntu', sans-serif; font-size: 15px; font-weight: 500; color: var(--teal-dark); margin-bottom: 1rem; }

    /* ── AKTIV TIMER CARD ── */
    .aktiv-card { background: var(--teal-dark); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; color: #fff; }
    .aktiv-card.idle { background: #fff; border: 1px solid var(--border); }
    .aktiv-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .aktiv-label { font-size: 12px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.8px; }
    .aktiv-card.idle .aktiv-label { color: var(--text-muted); }
    .aktiv-kunde-navn { font-family: 'Ubuntu', sans-serif; font-size: 22px; font-weight: 700; margin-top: 2px; }
    .aktiv-card.idle .aktiv-kunde-navn { color: var(--text-muted); font-size: 16px; font-weight: 400; }
    .timer-clock { font-family: 'Ubuntu', sans-serif; font-size: 48px; font-weight: 700; letter-spacing: 2px; line-height: 1; }
    .aktiv-card.idle .timer-clock { color: var(--border); font-size: 36px; }
    .aktiv-bottom { display: flex; align-items: center; gap: 10px; margin-top: 1.25rem; flex-wrap: wrap; }
    .btn-start { background: #fff; color: var(--teal-dark); border: none; padding: 10px 28px; border-radius: 8px; font-family: 'Ubuntu', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; }
    .btn-start:hover { background: var(--teal-light); }
    .btn-start:disabled { background: rgba(255,255,255,0.3); color: rgba(255,255,255,0.5); cursor: not-allowed; }
    .aktiv-card.idle .btn-start { background: var(--teal); color: #fff; }
    .btn-stop { background: var(--error); color: #fff; border: none; padding: 10px 28px; border-radius: 8px; font-family: 'Ubuntu', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; }
    .btn-bytt { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 10px 16px; border-radius: 8px; font-size: 14px; cursor: pointer; }
    .btn-bytt:hover { background: rgba(255,255,255,0.25); }
    .btn-reset-sm { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); border: none; padding: 10px 12px; border-radius: 8px; font-size: 14px; cursor: pointer; }
    .aktiv-card.idle .btn-bytt, .aktiv-card.idle .btn-reset-sm { display: none; }

    /* ── KUNDESØK MODAL-ISH ── */
    .kunde-sok-panel { margin-bottom: 1rem; }
    .search-wrap { position: relative; }
    .search-wrap input { width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: 8px; font-family: 'Open Sans', sans-serif; font-size: 15px; color: var(--text); }
    .search-wrap input:focus { outline: none; border-color: var(--teal); }
    .search-results { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); z-index: 100; max-height: 240px; overflow-y: auto; margin-top: 4px; }
    .search-item { padding: 10px 14px; font-size: 14px; cursor: pointer; border-bottom: 1px solid var(--border); }
    .search-item:last-child { border-bottom: none; }
    .search-item:hover { background: var(--teal-light); }
    .search-item-name { font-weight: 500; color: var(--text); }
    .search-item-domain { font-size: 12px; color: var(--text-muted); }

    /* ── SNARVEIER ── */
    .snarveier { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 0.75rem; }
    .snarvei-label { font-size: 12px; color: var(--text-muted); width: 100%; }
    .snarvei-btn { background: var(--teal-light); color: var(--teal-dark); border: 1px solid var(--teal); border-radius: 20px; padding: 5px 14px; font-size: 13px; cursor: pointer; white-space: nowrap; }
    .snarvei-btn:hover { background: var(--teal); color: #fff; }

    /* ── MANUELL FORM ── */
    .selected-customer { background: var(--teal-light); border: 1px solid var(--teal); border-radius: 8px; padding: 8px 12px; font-size: 14px; color: var(--teal-dark); display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
    .selected-customer button { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 18px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 0.75rem; }
    .form-group label { font-size: 12px; color: var(--text-muted); }
    .form-group input, .form-group textarea { padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; font-family: 'Open Sans', sans-serif; font-size: 14px; color: var(--text); }
    .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--teal); }
    .form-group textarea { resize: vertical; min-height: 60px; }
    .form-full { grid-column: 1 / -1; }
    .btn-add { width: 100%; padding: 11px; background: var(--success); color: #fff; border: none; border-radius: 8px; font-family: 'Ubuntu', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; }
    .btn-add:hover { background: #005a3c; }

    /* ── TIMELISTE ── */
    .time-entries { display: flex; flex-direction: column; gap: 8px; }
    .entry-item { background: var(--bg); border-radius: 8px; padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; font-size: 14px; border: 1px solid transparent; }
    .entry-item.editing { border-color: var(--teal); background: var(--teal-light); }
    .entry-left { display: flex; flex-direction: column; gap: 2px; flex: 1; }
    .entry-kunde { font-weight: 500; color: var(--text); }
    .entry-meta { font-size: 12px; color: var(--text-muted); }
    .entry-right { display: flex; align-items: center; gap: 8px; }
    .entry-tid { font-family: 'Ubuntu', sans-serif; font-weight: 500; color: var(--teal-dark); min-width: 36px; text-align: right; }
    .btn-edit { background: none; border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; font-size: 13px; padding: 3px 8px; border-radius: 6px; }
    .btn-edit:hover { border-color: var(--teal); color: var(--teal); }
    .btn-delete { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; }
    .btn-delete:hover { color: var(--error); }
    .edit-panel { background: var(--teal-light); border: 1px solid var(--teal); border-radius: 10px; padding: 1rem; margin-top: 4px; }
    .edit-panel-title { font-size: 13px; font-weight: 500; color: var(--teal-dark); margin-bottom: 0.75rem; }
    .edit-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 0.75rem; }
    .edit-btns { display: flex; gap: 8px; }
    .btn-save { background: var(--teal); color: #fff; border: none; padding: 8px 20px; border-radius: 8px; font-family: 'Ubuntu', sans-serif; font-size: 14px; cursor: pointer; }
    .btn-cancel-edit { background: #fff; color: var(--text-muted); border: 1px solid var(--border); padding: 8px 16px; border-radius: 8px; font-size: 14px; cursor: pointer; }
    .total-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: var(--teal-light); border-radius: 8px; margin-top: 8px; }
    .total-label { font-size: 13px; color: var(--teal-dark); }
    .total-tid { font-family: 'Ubuntu', sans-serif; font-size: 18px; font-weight: 700; color: var(--teal-dark); }
    .empty-state { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 14px; }

    .btn-submit { width: 100%; padding: 14px; background: var(--teal); color: #fff; border: none; border-radius: 8px; font-family: 'Ubuntu', sans-serif; font-size: 16px; font-weight: 500; cursor: pointer; margin-top: 0.5rem; }
    .btn-submit:hover { background: var(--teal-dark); }
    .btn-submit:disabled { background: var(--border); cursor: not-allowed; }
    .status-msg { text-align: center; font-size: 14px; margin-top: 0.5rem; min-height: 20px; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    <div class="topbar-logo-mark">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7v10l10 5 10-5V7L12 2zm0 2.5l7.5 3.75L12 12 4.5 8.25 12 4.5zM4 9.5l7 3.5v6.5L4 16V9.5zm9 10V13l7-3.5V16l-7 3.5z"/></svg>
    </div>
    Mystore
  </div>
  <div class="topbar-right">
    <span class="week-badge" id="week-badge">Uke –</span>
    <span class="user-name" id="user-name"></span>
    <button class="btn-logout" onclick="loggUt()">Logg ut</button>
  </div>
</div>

<div class="main">

  <!-- AKTIV TIMER -->
  <div class="aktiv-card idle" id="aktiv-card">
    <div class="aktiv-top">
      <div>
        <div class="aktiv-label">Jobber med</div>
        <div class="aktiv-kunde-navn" id="aktiv-kunde-navn">Ingen kunde valgt</div>
      </div>
      <div class="timer-clock" id="timer-clock">00:00:00</div>
    </div>
    <div class="aktiv-bottom">
      <button class="btn-start" id="btn-start" onclick="startTimer()" disabled>Start</button>
      <button class="btn-stop" id="btn-stop" onclick="stoppOgLagre()" style="display:none">Stopp og lagre</button>
      <button class="btn-bytt" onclick="visSokPanel()">Bytt kunde</button>
      <button class="btn-reset-sm" onclick="resetTimer()">↺ Nullstill</button>
    </div>
  </div>

  <!-- KUNDESØK PANEL -->
  <div class="card kunde-sok-panel" id="kunde-sok-panel">
    <div class="card-title">🔍 Velg kunde</div>
    <div class="search-wrap">
      <input type="text" id="kunde-sok" placeholder="Søk etter kunde..." autocomplete="off">
      <div class="search-results" id="search-results" style="display:none"></div>
    </div>
    <div class="snarveier" id="snarveier" style="display:none">
      <span class="snarvei-label">Nylig brukt</span>
    </div>
  </div>

  <!-- LEGG TIL MANUELT -->
  <div class="card">
    <div class="card-title">➕ Legg til manuelt</div>
    <div id="manuell-kunde-sok-wrap">
      <div class="search-wrap">
        <input type="text" id="manuell-kunde-sok" placeholder="Søk etter kunde..." autocomplete="off">
        <div class="search-results" id="manuell-search-results" style="display:none"></div>
      </div>
    </div>
    <div id="manuell-valgt-wrap" style="display:none">
      <div class="selected-customer">
        <strong id="manuell-valgt-navn"></strong>
        <button onclick="fjernManuellKunde()">✕</button>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Dato</label>
        <input type="date" id="dato-input">
      </div>
      <div class="form-group">
        <label>Timer brukt</label>
        <input type="number" id="timer-input" min="0" max="24" step="0.25" placeholder="f.eks. 1.5">
      </div>
    </div>
    <div class="form-group">
      <label>Kommentar</label>
      <textarea id="kommentar-input" placeholder="Hva ble gjort?"></textarea>
    </div>
    <button class="btn-add" onclick="leggTilPost()">Legg til</button>
  </div>

  <!-- TIMELISTE -->
  <div class="card">
    <div class="card-title">📋 Timer denne uken</div>
    <div class="time-entries" id="time-entries">
      <div class="empty-state">Ingen timer registrert ennå</div>
    </div>
    <div class="total-bar" id="total-bar" style="display:none">
      <span class="total-label">Totalt</span>
      <span class="total-tid" id="total-tid">0t</span>
    </div>
  </div>

  <button class="btn-submit" id="btn-submit" onclick="sendInn()">Send inn uke <span id="submit-uke"></span></button>
  <p class="status-msg" id="status-msg"></p>

</div>

<script>
  // ── Auth ──
  const ansattId   = localStorage.getItem('ms_employee_id');
  const ansattNavn = localStorage.getItem('ms_employee_name');
  if (!ansattId) window.location.href = 'index.html';

  // ── Uke ──
  function getWeekNumber(d) {
    d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
    d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
    const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
    return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  }
  const now   = new Date();
  const ukeNr = getWeekNumber(now);
  const aar   = now.getFullYear();
  document.getElementById('week-badge').textContent = `Uke ${ukeNr} · ${aar}`;
  document.getElementById('user-name').textContent  = ansattNavn;
  document.getElementById('submit-uke').textContent = ukeNr;
  document.getElementById('dato-input').value = now.toISOString().split('T')[0];

  // ── JSONP ──
  function jsonpGet(params) {
    return new Promise((resolve, reject) => {
      const cbName = 'cb_' + Date.now();
      const url = CONFIG.APPS_SCRIPT_URL + '?' + Object.entries({...params, callback: cbName})
        .map(([k,v]) => `${k}=${encodeURIComponent(v)}`).join('&');
      window[cbName] = data => { delete window[cbName]; resolve(data); };
      const s = document.createElement('script');
      s.src = url; s.onerror = () => reject(new Error('JSONP feilet'));
      document.body.appendChild(s);
    });
  }

  // ── Nylig brukte kunder ──
  let nyligBrukte = JSON.parse(localStorage.getItem('ms_nylig_kunder') || '[]');

  function lagreNyligBrukt(kunde) {
    nyligBrukte = [kunde, ...nyligBrukte.filter(k => k.id !== kunde.id)].slice(0, 5);
    localStorage.setItem('ms_nylig_kunder', JSON.stringify(nyligBrukte));
    oppdaterSnarveier();
  }

  function oppdaterSnarveier() {
    const el = document.getElementById('snarveier');
    if (!nyligBrukte.length) { el.style.display = 'none'; return; }
    el.style.display = 'flex';
    el.innerHTML = '<span class="snarvei-label">Nylig brukt</span>' +
      nyligBrukte.map(k => `<button class="snarvei-btn" onclick='velgAktivKunde(${JSON.stringify(k)})'>${k.name}</button>`).join('');
  }
  oppdaterSnarveier();

  // ── HubSpot-søk ──
  const hsCache = {};
  let debounceTimers = {};

  function lagSok(inputId, resultatId, velgFn) {
    const input   = document.getElementById(inputId);
    const resultat = document.getElementById(resultatId);
    input.addEventListener('input', e => {
      clearTimeout(debounceTimers[inputId]);
      const q = e.target.value.trim();
      if (q.length < 2) { resultat.style.display = 'none'; return; }
      debounceTimers[inputId] = setTimeout(() => sokHubSpot(q, resultat, velgFn), 300);
    });
    document.addEventListener('click', e => {
      if (!e.target.closest('#' + inputId) && !e.target.closest('#' + resultatId)) {
        resultat.style.display = 'none';
      }
    });
  }

  async function sokHubSpot(q, resultatEl, velgFn) {
    if (hsCache[q]) { visResultater(hsCache[q], resultatEl, velgFn); return; }
    if (!CONFIG.HUBSPOT_TOKEN || CONFIG.HUBSPOT_TOKEN.startsWith('FYLL')) {
      const demo = [
        { id: 'demo-1', name: 'Demo Kunde AS', domain: 'demokunde.no' },
        { id: 'demo-2', name: 'Test Bedrift AS', domain: 'test.no' },
        { id: 'demo-3', name: 'Eksempel Firma AS', domain: 'eksempel.no' }
      ];
      hsCache[q] = demo; visResultater(demo, resultatEl, velgFn); return;
    }
    try {
      const res = await fetch('https://api.hubapi.com/crm/v3/objects/companies/search', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${CONFIG.HUBSPOT_TOKEN}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: q, properties: ['name','domain'], limit: 8 })
      });
      const data = await res.json();
      const results = (data.results||[]).map(r => ({ id: r.id, name: r.properties.name, domain: r.properties.domain||'' }));
      hsCache[q] = results;
      visResultater(results, resultatEl, velgFn);
    } catch(e) { console.warn('HubSpot feilet:', e); }
  }

  function visResultater(results, el, velgFn) {
    if (!results.length) { el.style.display = 'none'; return; }
    el.innerHTML = results.map(r => `
      <div class="search-item" onclick='${velgFn}(${JSON.stringify(r)})'>
        <div class="search-item-name">${r.name}</div>
        <div class="search-item-domain">${r.domain}</div>
      </div>`).join('');
    el.style.display = 'block';
  }

  lagSok('kunde-sok', 'search-results', 'velgAktivKunde');
  lagSok('manuell-kunde-sok', 'manuell-search-results', 'velgManuellKunde');

  // ── AKTIV TIMER ──
  let aktivKunde   = null;
  let timerInterval = null;
  let sekunder      = 0;
  let timerRunning  = false;

  function velgAktivKunde(kunde) {
    if (timerRunning) {
      if (confirm(`Bytt fra "${aktivKunde.name}"?\nTid (${formatTid(sekunder)}) lagres automatisk.`)) {
        lagreTimerSomPost();
      } else return;
    }
    aktivKunde = kunde;
    lagreNyligBrukt(kunde);
    document.getElementById('aktiv-kunde-navn').textContent = kunde.name;
    document.getElementById('aktiv-card').classList.remove('idle');
    document.getElementById('btn-start').disabled = false;
    document.getElementById('kunde-sok').value = '';
    document.getElementById('search-results').style.display = 'none';
  }

  function visSokPanel() {
    document.getElementById('kunde-sok').focus();
  }

  function startTimer() {
    if (!aktivKunde) return;
    timerRunning = true;
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'inline-block';
    timerInterval = setInterval(() => {
      sekunder++;
      document.getElementById('timer-clock').textContent = formatTid(sekunder);
    }, 1000);
  }

  function stoppOgLagre() {
    clearInterval(timerInterval);
    timerRunning = false;
    document.getElementById('btn-start').style.display = 'inline-block';
    document.getElementById('btn-stop').style.display = 'none';
    // Fyll manuell form
    document.getElementById('timer-input').value = (sekunder / 3600).toFixed(2);
    if (aktivKunde) velgManuellKunde(aktivKunde);
    resetTimer();
  }

  function lagreTimerSomPost() {
    if (sekunder < 30) { resetTimer(); return; }
    poster.push({
      dato: now.toISOString().split('T')[0],
      hubspot_id: aktivKunde.id,
      kunde_navn: aktivKunde.name,
      minutter: Math.round(sekunder / 60),
      kommentar: '',
      kilde: 'timer'
    });
    lagreDraft();
    visTimer();
    resetTimer();
  }

  function resetTimer() {
    clearInterval(timerInterval);
    timerRunning = false;
    sekunder = 0;
    document.getElementById('timer-clock').textContent = '00:00:00';
    document.getElementById('btn-start').style.display = 'inline-block';
    document.getElementById('btn-stop').style.display = 'none';
  }

  function formatTid(sek) {
    const h = Math.floor(sek / 3600);
    const m = Math.floor((sek % 3600) / 60);
    const s = sek % 60;
    return [h,m,s].map(v => String(v).padStart(2,'0')).join(':');
  }

  // ── MANUELL REGISTRERING ──
  let manuellKunde = null;

  function velgManuellKunde(kunde) {
    manuellKunde = kunde;
    document.getElementById('manuell-kunde-sok-wrap').style.display = 'none';
    document.getElementById('manuell-valgt-wrap').style.display = 'block';
    document.getElementById('manuell-valgt-navn').textContent = kunde.name;
    document.getElementById('manuell-search-results').style.display = 'none';
    document.getElementById('manuell-kunde-sok').value = '';
    lagreNyligBrukt(kunde);
  }

  function fjernManuellKunde() {
    manuellKunde = null;
    document.getElementById('manuell-kunde-sok-wrap').style.display = 'block';
    document.getElementById('manuell-valgt-wrap').style.display = 'none';
  }

  function leggTilPost() {
    if (!manuellKunde) { alert('Velg en kunde først.'); return; }
    const timerVal = parseFloat(document.getElementById('timer-input').value);
    if (!timerVal || timerVal <= 0) { alert('Angi antall timer.'); return; }
    const dato = document.getElementById('dato-input').value;
    if (!dato) { alert('Velg dato.'); return; }
    poster.push({
      dato,
      hubspot_id: manuellKunde.id,
      kunde_navn: manuellKunde.name,
      minutter: Math.round(timerVal * 60),
      kommentar: document.getElementById('kommentar-input').value.trim(),
      kilde: 'manuell'
    });
    lagreDraft();
    visTimer();
    fjernManuellKunde();
    document.getElementById('timer-input').value = '';
    document.getElementById('kommentar-input').value = '';
  }

  // ── TIMELISTE ──
  let poster = JSON.parse(localStorage.getItem('ms_draft_' + ukeNr) || '[]');
  let redigererIndex = null;

  function lagreDraft() {
    localStorage.setItem('ms_draft_' + ukeNr, JSON.stringify(poster));
  }

  function visTimer() {
    const el = document.getElementById('time-entries');
    const totalBar = document.getElementById('total-bar');
    if (!poster.length) {
      el.innerHTML = '<div class="empty-state">Ingen timer registrert ennå</div>';
      totalBar.style.display = 'none'; return;
    }
    el.innerHTML = poster.map((p, i) => `
      <div class="entry-item ${redigererIndex === i ? 'editing' : ''}" id="entry-${i}">
        <div class="entry-left">
          <div class="entry-kunde">${p.kunde_navn}</div>
          <div class="entry-meta">${p.dato} · ${p.kommentar || '–'} · <em>${p.kilde}</em></div>
        </div>
        <div class="entry-right">
          <span class="entry-tid">${(p.minutter/60).toFixed(1)}t</span>
          <button class="btn-edit" onclick="startRediger(${i})">✏️</button>
          <button class="btn-delete" onclick="slettPost(${i})">🗑</button>
        </div>
      </div>
      ${redigererIndex === i ? `
      <div class="edit-panel">
        <div class="edit-panel-title">Rediger post</div>
        <div class="edit-form-row">
          <div class="form-group">
            <label>Kunde</label>
            <input type="text" id="edit-kunde-navn" value="${p.kunde_navn}">
          </div>
          <div class="form-group">
            <label>Dato</label>
            <input type="date" id="edit-dato" value="${p.dato}">
          </div>
          <div class="form-group">
            <label>Timer</label>
            <input type="number" id="edit-timer" value="${(p.minutter/60).toFixed(2)}" min="0" max="24" step="0.25">
          </div>
          <div class="form-group">
            <label>Kommentar</label>
            <input type="text" id="edit-kommentar" value="${p.kommentar || ''}">
          </div>
        </div>
        <div class="edit-btns">
          <button class="btn-save" onclick="lagreRediger(${i})">Lagre</button>
          <button class="btn-cancel-edit" onclick="avbrytRediger()">Avbryt</button>
        </div>
      </div>` : ''}`).join('');

    const totalMin = poster.reduce((s, p) => s + p.minutter, 0);
    document.getElementById('total-tid').textContent = (totalMin/60).toFixed(1) + 't';
    totalBar.style.display = 'flex';
  }

  function startRediger(i) { redigererIndex = i; visTimer(); }
  function avbrytRediger() { redigererIndex = null; visTimer(); }

  function lagreRediger(i) {
    const timer = parseFloat(document.getElementById('edit-timer').value);
    if (!timer || timer <= 0) { alert('Angi gyldig tid.'); return; }
    poster[i].kunde_navn = document.getElementById('edit-kunde-navn').value.trim() || poster[i].kunde_navn;
    poster[i].dato       = document.getElementById('edit-dato').value || poster[i].dato;
    poster[i].minutter   = Math.round(timer * 60);
    poster[i].kommentar  = document.getElementById('edit-kommentar').value.trim();
    redigererIndex = null;
    lagreDraft();
    visTimer();
  }

  function slettPost(i) {
    if (redigererIndex === i) redigererIndex = null;
    poster.splice(i, 1);
    lagreDraft();
    visTimer();
  }

  visTimer();

  // ── SEND INN ──
  async function sendInn() {
    if (!poster.length) { alert('Ingen timer å sende inn.'); return; }
    const btn = document.getElementById('btn-submit');
    const msg = document.getElementById('status-msg');
    btn.disabled = true;
    btn.textContent = 'Sender inn...';
    msg.textContent = '';

    try {
      const data = await jsonpGet({
        action: 'submit_week',
        ansatt_id: ansattId,
        ansatt_navn: ansattNavn,
        avdeling: '',
        uke_nr: ukeNr,
        aar,
        timer: JSON.stringify(poster)
      });

      if (data.status === 'ok') {
        localStorage.removeItem('ms_draft_' + ukeNr);
        msg.style.color = 'var(--success)';
        msg.textContent = `✓ Uke ${ukeNr} er sendt inn! ${data.rows_written} poster lagret.`;
        poster = []; visTimer();
      } else if (data.status === 'duplikat') {
        if (confirm(data.message)) {
          const data2 = await jsonpGet({
            action: 'submit_week',
            ansatt_id: ansattId,
            ansatt_navn: ansattNavn,
            avdeling: '',
            uke_nr: ukeNr,
            aar,
            timer: JSON.stringify(poster),
            overskrive: 'true'
          });
          if (data2.status === 'ok') {
            localStorage.removeItem('ms_draft_' + ukeNr);
            msg.style.color = 'var(--success)';
            msg.textContent = `✓ Uke ${ukeNr} er oppdatert.`;
            poster = []; visTimer();
          }
        }
        btn.disabled = false;
        btn.textContent = `Send inn uke ${ukeNr}`;
      } else {
        msg.style.color = 'var(--error)';
        msg.textContent = 'Feil: ' + (data.message || 'Ukjent feil');
        btn.disabled = false;
        btn.textContent = `Send inn uke ${ukeNr}`;
      }
    } catch(e) {
      msg.style.color = 'var(--error)';
      msg.textContent = 'Tilkoblingsfeil. Prøv igjen.';
      btn.disabled = false;
      btn.textContent = `Send inn uke ${ukeNr}`;
    }
  }

  function loggUt() {
    localStorage.removeItem('ms_employee_id');
    localStorage.removeItem('ms_employee_name');
    localStorage.removeItem('ms_session');
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
